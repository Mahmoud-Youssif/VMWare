---
# Ansible Galaxy collections bundled into the EE image
collections:
  - name: vmware.vmware_rest
    version: ">=3.0.0"

  - name: community.vmware
    version: ">=4.0.0"

  # cloud.vmware_ops is only available on Red Hat Automation Hub (not public Galaxy).
  # To include it, configure an automation_hub galaxy server in ansible.cfg and
  # uncomment the line below:
  # - name: cloud.vmware_ops

  - name: ansible.windows
    version: ">=2.0.0"
