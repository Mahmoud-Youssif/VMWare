---
# Ansible Execution Environment definition for VMware provisioning
# Built with ansible-builder >= 3.0 (EE definition v3)
#
# Build:
#   ansible-builder build -f execution-environment.yml -t ee-vmware:latest -v 3
#
# Push to Quay:
#   podman tag ee-vmware:latest quay.io/myoussif/ee-vmware:latest
#   podman push quay.io/myoussif/ee-vmware:latest

version: 3

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/ee-minimal-rhel9:latest

dependencies:
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt

additional_build_steps:
  prepend_galaxy:
    - ENV ANSIBLE_GALAXY_SERVER_TIMEOUT=120

  prepend_final:
    # The ee-minimal-rhel9 base image ships Python 3.9 as system default
    # (/usr/bin/python3) but ansible-core uses /usr/bin/python3.12.
    # ansible-builder's assemble step installs packages into Python 3.9
    # site-packages which ansible cannot see. Explicitly install every
    # runtime package needed by VMware and Windows modules into Python 3.12.
    - RUN /usr/bin/python3.12 -m pip install --no-cache-dir pyvmomi pywinrm requests-ntlm

options:
  package_manager_path: /usr/bin/microdnf
  # microdnf is available in both RHEL8 and RHEL9 ee-minimal images
