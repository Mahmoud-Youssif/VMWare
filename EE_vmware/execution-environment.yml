---
# Ansible Execution Environment definition for VMware provisioning
# Built with ansible-builder >= 3.0 (EE definition v3)
#
# Build:
#   ansible-builder build -f execution-environment.yml -t ee-vmware:latest -v 3
#
# Tag and push to a registry:
#   podman tag ee-vmware:latest <registry>/ee-vmware:latest
#   podman push <registry>/ee-vmware:latest

version: 3

images:
  base_image:
    name: registry.redhat.io/ansible-automation-platform-25/ee-minimal-rhel8:latest

dependencies:
  galaxy: requirements.yml
  python: requirements.txt
  system: bindep.txt

additional_build_steps:
  prepend_galaxy:
    - ENV ANSIBLE_GALAXY_SERVER_TIMEOUT=120

  append_final:
    - RUN ansible --version
    - RUN ansible-galaxy collection list

options:
  package_manager_path: /usr/bin/microdnf
