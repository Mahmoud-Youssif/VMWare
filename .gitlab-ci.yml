---
# NOTE: This repo is currently hosted on GitHub. This file is kept for when
# the repo is mirrored or moved to GitLab. The equivalent GitHub Actions
# workflow lives at .github/workflows/ci.yml and runs automatically.
#
# GitLab-specific variables needed if running here:
#   CI_REGISTRY_IMAGE   — set automatically by GitLab CI
#   RHN_USERNAME        — Red Hat registry username (CI/CD variable)
#   RHN_PASSWORD        — Red Hat registry password (CI/CD variable)

stages:
  - lint
  - validate
  - build

variables:
  PY_COLORS: "1"
  ANSIBLE_FORCE_COLOR: "1"

.base:
  before_script:
    - pip install --quiet ansible ansible-lint yamllint

yamllint:
  extends: .base
  stage: lint
  image: python:3.11-slim
  script:
    - yamllint -d "{extends: default, rules: {line-length: {max: 160}, truthy: {allowed-values: ['true', 'false']}}}" .

ansible-lint:
  extends: .base
  stage: lint
  image: python:3.11-slim
  script:
    - ansible-galaxy collection install -r collections/requirements.yml -p ./collections
    - ansible-lint --profile production

syntax-check:
  extends: .base
  stage: validate
  image: python:3.11-slim
  script:
    - ansible-galaxy collection install -r collections/requirements.yml -p ./collections
    - ansible-playbook --syntax-check playbook.yml
    - ansible-playbook --syntax-check new_vm_coll.yml
    - ansible-playbook --syntax-check new_playbook.yml
    - ansible-playbook --syntax-check vcenter_survey_refresh.yml

ee-build:
  stage: build
  image: quay.io/ansible/ansible-builder:latest
  rules:
    - changes:
        - EE_vmware/**
  before_script:
    - podman login registry.redhat.io
        --username "$RHN_USERNAME"
        --password "$RHN_PASSWORD"
  script:
    - cd EE_vmware
    - ansible-builder build
        --file execution-environment.yml
        --tag "${CI_REGISTRY_IMAGE}/ee-vmware:${CI_COMMIT_SHORT_SHA}"
        --tag "${CI_REGISTRY_IMAGE}/ee-vmware:latest"
        --verbosity 3
    - podman push "${CI_REGISTRY_IMAGE}/ee-vmware:${CI_COMMIT_SHORT_SHA}"
    - podman push "${CI_REGISTRY_IMAGE}/ee-vmware:latest"
  # Set these CI/CD variables in GitLab → Settings → CI/CD → Variables:
  #   RHN_USERNAME  — Red Hat registry username
  #   RHN_PASSWORD  — Red Hat registry password
