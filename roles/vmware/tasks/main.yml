---
- name: Assert required variables are set
  ansible.builtin.assert:
    that:
      - ha_datacenter | length > 0
      - vmware_cluster_name | length > 0
      - new_vm_name | length > 0
      - new_hostname | length > 0
      - template_name | length > 0
      - nic_ip | length > 0
      - nic_prefix | length > 0
      - nic_gw | length > 0
      - nic_virt_group | length > 0
      - dns_servers | length > 0
      - vm_admin_password | length > 0
      - vm_ssh_public_key | length > 0
    fail_msg: >-
      Required variable is not set. Ensure ha_datacenter, vmware_cluster_name,
      new_vm_name, new_hostname, template_name, nic_*, dns_servers,
      vm_admin_password, and vm_ssh_public_key are all defined.

# ------------------------------------------------------------------ #
# Step 1: Clone template (powered off, no VMware customization spec)  #
# ------------------------------------------------------------------ #
- name: Clone RHEL VM from template (powered off)
  community.vmware.vmware_guest:
    hostname: "{{ vmware.host }}"
    username: "{{ vmware.username }}"
    password: "{{ vmware.password }}"
    validate_certs: false
    state: present
    folder: "{{ vmware_new_vm_folder | default(omit) }}"
    datacenter: "{{ ha_datacenter }}"
    cluster: "{{ vmware_cluster_name }}"
    name: "{{ new_vm_name }}"
    template: "{{ template_name }}"
    networks:
      - name: "{{ nic_virt_group }}"
  register: vm_clone_result

# ------------------------------------------------------------------ #
# Step 2: Build cloud-init payloads                                   #
# ------------------------------------------------------------------ #
- name: Build cloud-init metadata (network config + hostname)
  ansible.builtin.set_fact:
    _vmware_cloud_init_metadata: |
      instance-id: {{ new_vm_name }}
      local-hostname: {{ new_hostname }}{% if dns_domain | length > 0 %}.{{ dns_domain }}{% endif %}

      network:
        version: 2
        ethernets:
          {{ vm_network_interface }}:
            addresses:
              - {{ nic_ip }}/{{ nic_prefix }}
            gateway4: {{ nic_gw }}
            nameservers:
              addresses: {{ dns_servers | to_json }}{% if dns_domain | length > 0 %}
              search:
                - {{ dns_domain }}{% endif %}

- name: Build cloud-init userdata (hostname, user, SSH key, password)
  ansible.builtin.set_fact:
    _vmware_cloud_init_userdata: |
      #cloud-config
      hostname: {{ new_hostname }}
      {% if dns_domain | length > 0 %}fqdn: {{ new_hostname }}.{{ dns_domain }}{% endif %}

      users:
        - name: {{ vm_admin_user }}
          groups: wheel
          sudo: "ALL=(ALL) NOPASSWD:ALL"
          shell: /bin/bash
          lock_passwd: false
          ssh_authorized_keys:
            - {{ vm_ssh_public_key }}

      chpasswd:
        list: |
          {{ vm_admin_user }}:{{ vm_admin_password }}
        expire: false

      ssh_pwauth: false

      runcmd:
        - nmcli con reload

# ------------------------------------------------------------------ #
# Step 3: Inject cloud-init payloads as guestinfo properties          #
# ------------------------------------------------------------------ #
- name: Inject cloud-init guestinfo (metadata + userdata)
  community.vmware.vmware_guest:
    hostname: "{{ vmware.host }}"
    username: "{{ vmware.username }}"
    password: "{{ vmware.password }}"
    validate_certs: false
    name: "{{ new_vm_name }}"
    datacenter: "{{ ha_datacenter }}"
    state: present
    advanced_settings:
      - key: guestinfo.metadata
        value: "{{ _vmware_cloud_init_metadata | b64encode }}"
      - key: guestinfo.metadata.encoding
        value: base64
      - key: guestinfo.userdata
        value: "{{ _vmware_cloud_init_userdata | b64encode }}"
      - key: guestinfo.userdata.encoding
        value: base64

# ------------------------------------------------------------------ #
# Step 4: Power on — cloud-init reads guestinfo on first boot         #
# ------------------------------------------------------------------ #
- name: Power on VM
  community.vmware.vmware_guest_powerstate:
    hostname: "{{ vmware.host }}"
    username: "{{ vmware.username }}"
    password: "{{ vmware.password }}"
    validate_certs: false
    name: "{{ new_vm_name }}"
    datacenter: "{{ ha_datacenter }}"
    state: powered-on

- name: Wait for SSH on new VM to become reachable
  ansible.builtin.wait_for:
    host: "{{ nic_ip }}"
    port: 22
    timeout: "{{ ssh_wait_timeout }}"
    state: started
  delegate_to: localhost

- name: Add new VM to in-memory inventory
  ansible.builtin.add_host:
    name: "{{ new_vm_name }}"
    ansible_host: "{{ nic_ip }}"
    ansible_user: "{{ vm_admin_user }}"
    ansible_ssh_private_key_file: "{{ vm_ssh_key | default(omit) }}"
    ansible_become: true
    ansible_become_method: sudo
    groups: vmware_new_vms
