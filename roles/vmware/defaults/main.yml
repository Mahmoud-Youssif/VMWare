---
# Datacenter and cluster placement
ha_datacenter: ""
vmware_cluster_name: ""
vmware_new_vm_folder: ""

# VM identity
new_vm_name: ""
new_hostname: ""
template_name: ""

# Network configuration
nic_virt_group: ""
nic_ip: ""
nic_prefix: "24"
nic_gw: ""
dns_servers: []

# DNS search domain (optional)
dns_domain: ""

# NIC name inside the RHEL guest (VMXNET3 on vSphere is typically ens192)
vm_network_interface: "ens192"

# SSH and user credentials for the new VM
vm_admin_user: "ansible"
vm_admin_password: ""
vm_ssh_public_key: ""
vm_ssh_key: ""

# How long to wait for SSH after power-on (seconds)
ssh_wait_timeout: 300
